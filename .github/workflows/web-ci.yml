name: Web CI

on:
  push:
    paths:
      - 'web/**'
      - 'pyproject.toml'
      - 'src/**'
      - 'patterns/**'
      - 'skills/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'scripts/dev.py'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'pyproject.toml'
      - 'src/**'
      - 'patterns/**'
      - 'skills/**'
      - 'examples/**'
      - 'benchmarks/**'
      - 'scripts/dev.py'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: web/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            web/backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ../..
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  release-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e .
      - run: python scripts/check_release_consistency.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  integration:
    runs-on: ubuntu-latest
    env:
      REWRITE_ENABLED: "false"
      CONTRIBUTIONS_ENABLED: "false"
      ADMIN_API_ENABLED: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            web/backend/pyproject.toml
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - run: python scripts/dev.py setup
      - run: python scripts/dev.py smoke --skip-setup
