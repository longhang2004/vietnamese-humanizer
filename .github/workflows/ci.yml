name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
      - run: python scripts/validate_skills.py
      - run: python scripts/validate_patterns.py
      - run: python scripts/validate_examples.py
      - run: python scripts/run_benchmarks.py --validate-only
      - run: python scripts/generate_pattern_docs.py --check

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -m venv .tmp-wheel-venv
      - run: .tmp-wheel-venv/bin/python -m pip install dist/*.whl
      - run: >-
          .tmp-wheel-venv/bin/python -c
          "import pathlib, tomllib, vietnamese_writing_skills;
          expected = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'];
          assert vietnamese_writing_skills.__version__ == expected"
      - run: .tmp-wheel-venv/bin/viet-writing-lint --help
      - run: .tmp-wheel-venv/bin/viet-writing-validate-skills --help
      - run: .tmp-wheel-venv/bin/viet-writing-validate-patterns --help
      - run: .tmp-wheel-venv/bin/viet-writing-validate-examples --help
      - run: .tmp-wheel-venv/bin/viet-writing-benchmark --help
      - run: .tmp-wheel-venv/bin/viet-writing-generate-docs --help
      - run: .tmp-wheel-venv/bin/viet-writing-lint tests/fixtures/natural_article.md
      - run: >-
          .tmp-wheel-venv/bin/python -c
          "from importlib.resources import files;
          root = files('vietnamese_writing_skills').joinpath('data');
          assert root.joinpath('patterns/schema.json').is_file();
          assert root.joinpath('examples/schema.json').is_file();
          assert root.joinpath('benchmarks/case.schema.json').is_file();
          assert root.joinpath('skills/humanizer-vi/SKILL.md').is_file()"
