name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
      - run: python scripts/validate_skills.py
      - run: python scripts/validate_patterns.py
      - run: python scripts/run_benchmarks.py --validate-only
      - run: python scripts/generate_pattern_docs.py --check
