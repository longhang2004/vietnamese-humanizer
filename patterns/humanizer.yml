schema_version: '1.0'
patterns:
- id: VI-HUM-L01
  name: dong-vai-tro-trong-viec
  skill: humanizer-vi
  category: lexical
  finding_type: heuristic
  scope: phrase
  aggregation: density
  severity: medium
  confidence: medium
  summary: Lạm dụng cấu trúc "đóng vai trò ... trong việc" khi một động từ trực tiếp rõ hơn.
  signals:
    regex:
    - \bđóng vai trò.{0,35}trong việc\b
  why_it_matters: Cụm dài che hành động chính và thường không cho biết tác động cụ thể.
  rewrite_strategy:
  - Xác định hành động thật rồi đưa động từ đó lên làm vị ngữ chính.
  - Giữ mức độ quan trọng nếu văn bản có căn cứ cho đánh giá ấy.
  bad_examples:
  - text: Tính năng này đóng vai trò quan trọng trong việc cải thiện hiệu suất.
    reason: Hành động cải thiện bị đặt sau một cụm trừu tượng.
  - text: Người quản lý đóng vai trò then chốt trong việc duy trì tiến độ.
    reason: Câu chưa nói người quản lý làm gì để giữ tiến độ.
  good_examples:
  - text: Tính năng này giúp cải thiện hiệu suất.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Người quản lý giúp duy trì tiến độ.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi văn bản thực sự phân tích vai trò của một người, bộ phận hoặc chức năng.
  false_positive_risk: medium
  tags:
  - danh-hoa
  - dong-tu-yeu
  - tru-tuong
  min_occurrences: 2
- id: VI-HUM-L02
  name: boi-canh-khong-ngung-phat-trien
  skill: humanizer-vi
  category: lexical
  finding_type: heuristic
  scope: paragraph
  aggregation: density
  severity: low
  confidence: medium
  summary: Câu mở bằng "trong bối cảnh không ngừng phát triển" nhưng không nêu thay đổi cụ thể.
  signals:
    phrases:
    - trong bối cảnh không ngừng phát triển
    - trong bối cảnh ngày càng phát triển
  why_it_matters: Lời dẫn chiếm chỗ nhưng không giúp người đọc biết điều gì đã thay đổi.
  rewrite_strategy:
  - Nêu thay đổi, mốc thời gian hoặc áp lực cụ thể; nếu không có thì bỏ lời dẫn.
  bad_examples:
  - text: Trong bối cảnh không ngừng phát triển, doanh nghiệp cần đổi mới.
    reason: Không có bối cảnh cụ thể.
  - text: Trong bối cảnh ngày càng phát triển, kỹ năng số rất quan trọng.
    reason: '"Phát triển" không có chủ thể hay thước đo.'
  good_examples:
  - text: Doanh nghiệp cần đổi mới.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Kỹ năng số ngày càng quan trọng.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi câu sau định nghĩa rõ xu hướng và lời dẫn giúp liên kết với đoạn trước.
  false_positive_risk: medium
  tags:
  - loi-dan
  - chung-chung
  min_occurrences: 2
- id: VI-HUM-L03
  name: loi-khen-chung-chung
  skill: humanizer-vi
  category: lexical
  finding_type: warning
  scope: paragraph
  aggregation: density
  severity: medium
  confidence: medium
  summary: Dùng nhiều lời khen như "đột phá" hoặc "vượt trội" mà không có căn cứ trong văn bản.
  signals:
    regex:
    - \b(?:đột phá|vượt trội|đẳng cấp|ấn tượng|tuyệt vời)\b
  why_it_matters: Giọng quảng cáo không có bằng chứng làm giảm độ tin cậy và có thể lệch register.
  rewrite_strategy:
  - Thay lời khen bằng đặc tính, kết quả hoặc bằng chứng đã có trong đầu vào.
  bad_examples:
  - text: Trong thử nghiệm nội bộ, công cụ xử lý 2.000 bản ghi mỗi phút với hiệu năng vượt trội.
    reason: Hai lời khen không có thước đo.
  - text: Gói này có bảo hành 24 tháng và hỗ trợ trong giờ hành chính với chất lượng đẳng cấp.
    reason: Câu không cung cấp thông tin kiểm chứng được.
  good_examples:
  - text: Trong thử nghiệm nội bộ, công cụ xử lý 2.000 bản ghi mỗi phút.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Gói này có bảo hành 24 tháng và hỗ trợ trong giờ hành chính.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi đây là trích dẫn, slogan đã duyệt hoặc lời đánh giá có nguồn và tiêu chí rõ.
  false_positive_risk: medium
  tags:
  - quang-cao
  - thieu-bang-chung
  min_occurrences: 2
- id: VI-HUM-D01
  name: mo-bai-thong-bao-noi-dung
  skill: humanizer-vi
  category: discourse
  finding_type: preference
  scope: document
  aggregation: single
  severity: low
  confidence: high
  summary: Mở bài thông báo "trong bài viết này" thay vì đi thẳng vào chủ đề.
  signals:
    regex:
    - (?:Trong|Ở) (?:bài viết|phần) này, (?:chúng ta|tôi|bài viết) (?:sẽ|cùng)
  why_it_matters: Câu meta lặp lại chức năng của tiêu đề và làm chậm thông tin chính.
  rewrite_strategy:
  - Mở bằng vấn đề, kết luận chính hoặc bối cảnh cụ thể.
  bad_examples:
  - text: Trong bài viết này, chúng ta sẽ cùng tìm hiểu cách cache giữ dữ liệu đã đọc để giảm số lần truy cập nguồn.
    reason: Chỉ thông báo việc sắp nói.
  - text: Ở phần này, bài viết sẽ trình bày ba nguyên tắc giúp API thay đổi mà không phá client cũ.
    reason: Heading đã thể hiện chức năng này.
  good_examples:
  - text: Cache giữ dữ liệu đã đọc để giảm số lần truy cập nguồn.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Ba nguyên tắc này giúp API thay đổi mà không phá client cũ.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Trong syllabus, proposal hoặc tài liệu dài cần nêu rõ phạm vi và cấu trúc.
  false_positive_risk: low
  tags:
  - mo-bai
  - meta
  min_occurrences: 1
- id: VI-HUM-D02
  name: ket-bai-xa-giao
  skill: humanizer-vi
  category: discourse
  finding_type: preference
  scope: document
  aggregation: single
  severity: low
  confidence: high
  summary: Kết thúc bằng lời xã giao chung chung không bổ sung hành động hoặc thông tin.
  signals:
    phrases:
    - hy vọng những thông tin trên sẽ hữu ích
    - hy vọng bài viết này hữu ích
  why_it_matters: Câu kết công thức làm yếu điểm dừng và thường không cần trong tài liệu.
  rewrite_strategy:
  - Kết ở thông tin cuối cùng hoặc nêu bước tiếp theo có thật.
  bad_examples:
  - text: Cấu hình mới có hiệu lực từ lần khởi động tiếp theo. Hy vọng những thông tin trên sẽ hữu ích.
    reason: Không thêm nội dung hay hành động.
  - text: Nhóm sẽ chốt phương án tại cuộc họp ngày 25 tháng 7. Hy vọng bài viết này hữu ích.
    reason: Câu kết sáo và lệch giọng tài liệu.
  good_examples:
  - text: Cấu hình mới có hiệu lực từ lần khởi động tiếp theo.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Nhóm sẽ chốt phương án tại cuộc họp ngày 25 tháng 7.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Trong thư cá nhân hoặc trao đổi chăm sóc khách hàng khi lời chúc phù hợp quan hệ.
  false_positive_risk: low
  tags:
  - ket-bai
  - xa-giao
  min_occurrences: 1
- id: VI-HUM-D03
  name: dan-nguon-mo-ho
  skill: humanizer-vi
  category: discourse
  finding_type: warning
  scope: sentence
  aggregation: single
  severity: high
  confidence: medium
  summary: Gán nhận định cho "các chuyên gia" hoặc "nhiều nghiên cứu" mà không xác định nguồn.
  signals:
    regex:
    - \b(?:các chuyên gia|nhiều nghiên cứu|giới quan sát|nhiều nguồn) (?:cho rằng|chỉ ra|nhận định)\b
  why_it_matters: Người đọc không thể kiểm tra nguồn, còn người biên tập dễ vô tình củng cố một tuyên bố chưa có
    căn cứ.
  rewrite_strategy:
  - Nêu nguồn có sẵn; nếu không có, thu hẹp tuyên bố hoặc đánh dấu cần nguồn.
  bad_examples:
  - text: Các chuyên gia cho rằng phương pháp này hoàn toàn an toàn.
    reason: Không rõ chuyên gia nào và tiêu chí an toàn nào.
  - text: Nhiều nghiên cứu chỉ ra mô hình giúp tăng năng suất.
    reason: Không có nghiên cứu, đối tượng hay mức tăng.
  good_examples:
  - text: Đoạn này chưa nêu nguồn cho nhận định rằng phương pháp hoàn toàn an toàn.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Đoạn này chưa xác định các nghiên cứu về tác động của mô hình lên năng suất.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi nguồn đã được nêu rõ ở câu ngay trước và cụm này chỉ tham chiếu lại.
  false_positive_risk: medium
  tags:
  - nguon
  - mo-ho
  - bao-toan
  min_occurrences: 1
- id: VI-HUM-S01
  name: lap-cau-mo-dau-bang-viec
  skill: humanizer-vi
  category: structural
  finding_type: heuristic
  scope: paragraph
  aggregation: sequence
  severity: medium
  confidence: medium
  summary: Nhiều câu liên tiếp mở bằng "Việc" tạo nhịp đều và che chủ thể thực hiện.
  signals:
    regex:
    - (?m)^\s*Việc\s+
  why_it_matters: Danh hóa liên tiếp làm đoạn nặng và khiến hành động khó nhìn thấy.
  rewrite_strategy:
  - Đưa chủ thể hoặc động từ lên đầu; gộp câu khi chúng cùng một chủ thể.
  bad_examples:
  - text: Việc cập nhật giúp giảm lỗi. Việc kiểm thử giúp tăng độ ổn định.
    reason: Hai câu cùng khuôn, chủ thể thực hiện biến mất.
  - text: Việc họp sớm là cần thiết. Việc gửi tài liệu trước cũng quan trọng.
    reason: Nhịp danh hóa lặp mà không cần thiết.
  good_examples:
  - text: Cập nhật giúp giảm lỗi; kiểm thử giúp tăng độ ổn định.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Nên họp sớm và gửi tài liệu trước cuộc họp.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi "việc" gọi tên một hành vi đã được định nghĩa trong văn bản pháp lý hoặc phân tích.
  false_positive_risk: medium
  tags:
  - danh-hoa
  - lap-cau
  min_occurrences: 3
- id: VI-HUM-S02
  name: khong-chi-ma-con-lap
  skill: humanizer-vi
  category: structural
  finding_type: heuristic
  scope: paragraph
  aggregation: count
  severity: low
  confidence: medium
  summary: Lặp cấu trúc "không chỉ ... mà còn" để tạo nhấn mạnh cho các ý bình thường.
  signals:
    regex:
    - \bkhông chỉ\b.{0,100}\bmà còn\b
  why_it_matters: Nhấn mạnh cơ học khiến đoạn khoa trương và các câu có cùng nhịp.
  rewrite_strategy:
  - Nêu trực tiếp hai tác động hoặc chọn tác động quan trọng hơn.
  bad_examples:
  - text: Công cụ không chỉ mở tệp 2 GB trong 4 giây mà còn có phím tắt cho các thao tác chính.
    reason: Hai lời khen chung chung được nâng giọng.
  - text: Khóa học không chỉ có sáu bài thực hành mà còn có một buổi phản biện.
    reason: Cấu trúc thay cho bằng chứng cụ thể.
  good_examples:
  - text: Công cụ mở tệp 2 GB trong 4 giây và có phím tắt cho các thao tác chính.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Khóa học có sáu bài thực hành và một buổi phản biện.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Khi phép đối sánh là trọng tâm lập luận và không bị lặp trong đoạn.
  false_positive_risk: high
  tags:
  - nhan-manh
  - doi-xung
  min_occurrences: 2
- id: VI-HUM-S03
  name: tu-noi-day-dac
  skill: humanizer-vi
  category: structural
  finding_type: heuristic
  scope: paragraph
  aggregation: density
  severity: medium
  confidence: medium
  summary: Dùng dày các từ nối "đồng thời", "qua đó" và "từ đó" dù quan hệ logic đã rõ.
  signals:
    regex:
    - \b(?:đồng thời|qua đó|từ đó)\b
  why_it_matters: Từ nối cơ học làm đoạn đều giọng và có thể gán quan hệ nhân quả không tồn tại.
  rewrite_strategy:
  - Giữ từ nối chỉ khi nó diễn đạt quan hệ logic cần thiết; tách câu nếu có quá nhiều mệnh đề.
  bad_examples:
  - text: Hệ thống lưu log, đồng thời gửi cảnh báo, qua đó giúp nhóm phản hồi, từ đó nâng cao chất lượng.
    reason: Ba từ nối kéo theo một chuỗi nhân quả chưa được chứng minh.
  - text: Nhóm sửa lỗi, đồng thời cập nhật tài liệu, qua đó tạo ra giá trị.
    reason: Phần cuối trừu tượng và không cần thiết.
  good_examples:
  - text: Hệ thống lưu log và gửi cảnh báo để nhóm phản hồi.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  - text: Nhóm sửa lỗi rồi cập nhật tài liệu.
    reason: Giữ các dữ kiện đã có và chỉ sửa cấu trúc mục tiêu.
  exceptions:
  - Trong lập luận dài khi mỗi từ nối biểu thị một quan hệ khác nhau và chính xác.
  false_positive_risk: medium
  tags:
  - tu-noi
  - logic
  min_occurrences: 3
- id: VI-HUM-S04
  name: do-dai-cau-dong-deu
  skill: humanizer-vi
  category: structural
  finding_type: heuristic
  scope: document
  aggregation: variance
  severity: low
  confidence: low
  summary: Năm câu trở lên có độ dài gần như nhau, tạo nhịp đều cần người viết đọc lại.
  signals:
    regex:
    - (?s)(?:[^.!?]{45,85}[.!?]\s*){5,}
  why_it_matters: Nhịp đều có thể làm ý chính và ý phụ có cùng trọng lượng, nhưng đây chỉ là heuristic.
  rewrite_strategy:
  - Đọc thành tiếng và chỉ tách hoặc gộp nơi cấu trúc ý cần thay đổi.
  bad_examples:
  - text: Nhóm nhận yêu cầu vào sáng nay. Nhóm kiểm tra dữ liệu vào buổi trưa. Nhóm gửi kết quả vào cuối ngày. Nhóm lưu biên bản sau cuộc họp. Nhóm đóng yêu cầu khi hoàn tất.
    reason: Các câu cùng khuôn và trọng lượng.
  - text: Máy chủ ghi log mỗi phút. Hệ thống gửi báo cáo mỗi giờ. Nhân viên xem dashboard mỗi ngày. Bộ phận sao lưu dữ liệu mỗi tuần. Quản lý rà báo cáo mỗi tháng.
    reason: Nhịp lặp che quan hệ giữa các hành động.
  good_examples:
  - text: Nhóm nhận yêu cầu sáng nay, kiểm tra dữ liệu vào buổi trưa và sẽ gửi kết quả cuối ngày. Sau cuộc họp, nhóm lưu biên bản và đóng yêu cầu khi hoàn tất.
  - text: Máy chủ ghi log mỗi phút và hệ thống gửi báo cáo mỗi giờ. Nhân viên xem dashboard hằng ngày; bộ phận sao lưu dữ liệu mỗi tuần, còn quản lý rà báo cáo mỗi tháng.
  exceptions:
  - Checklist, thông số kỹ thuật, văn bản cho người mới đọc hoặc nhịp lặp có chủ đích.
  false_positive_risk: high
  tags:
  - nhip-cau
  - heuristic
  min_occurrences: 1
